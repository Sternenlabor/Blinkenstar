; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:release]
platform = atmelavr
board = attiny88
framework = arduino
board_build.f_cpu = 8000000L
upload_protocol = atmelice_isp
;upload_protocol = avrispmkII
build_flags = 
    -DENABLE_MODEM
    -DRX_ALWAYS_ON
    -DMODEM_ADC_CHANNEL=6
;    -DMILLIS_USE_TIMER1  ; Force core to use Timer1 for millis()
;    -DADDITIONAL_CORE_FLAGS_IF_NEEDED
lib_ignore = _old_Modem

[env:debugwire]
extends = env:release
build_type = debug
debug_tool = custom
debug_server = dw-gdbserver
    --port=3333
    --device=${env:debugwire.board}
debug_init_cmds =
    define pio_reset_halt_target
         monitor reset
    end
    define pio_reset_run_target
         monitor reset
	       continue
    end
    target remote $DEBUG_PORT
    monitor debugwire enable
    $LOAD_CMDS
    $INIT_BREAK
debug_build_flags =
    -Og     ; optimize for debugging
    -ggdb3  ; include debug symbols
build_flags =
    ${env:release.build_flags}
    -DNO_STORED_PATTERN_BOOT_RESTORE
    -DSHUTDOWN_THRESHOLD=200
    -DBOTH_STABLE_THRESHOLD=4

[env:hwdiag]
platform = atmelavr
board = attiny88
framework = arduino
board_build.f_cpu = 8000000L
upload_protocol = atmelice_isp
build_type = release
build_flags =
    -DDIAG_BUTTONS
    -DDIAG_BOOT_MESSAGE
lib_ignore = _old_Modem

[env:jp1debug]
extends = env:release
build_type = debug
build_flags =
    ${env:release.build_flags}
    -DNO_BOOT_MESSAGE
    -DRX_NO_STORAGE
    -DRX_POLLING
    -DMODEM_DISABLE_FRONTEND_BIAS
    -DRECEIVE_HOLD_TICKS=120
    -DJP1_DEBUG_SERIAL
    -DJP1_DEBUG_NO_HEARTBEAT
    -DJP1_DEBUG_RX_EVENTS
    -DJP1_DEBUG_HEADLESS_RX
    -DJP1_DEBUG_BAUD=9600

[env:diaglog]
extends = env:release
build_flags =
    ${env:release.build_flags}
    -DDIAG_INTERNAL_LOG
    -DNO_BOOT_MESSAGE
    -DNO_STORED_PATTERN_BOOT_RESTORE
